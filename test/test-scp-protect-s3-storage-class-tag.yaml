---
AWSTemplateFormatVersion: "2010-09-09"

Description: |-
  (Temporary) Service control policy tests for
  github.com/sqlxpert/aws-rcp-s3-require-intelligent-tiering
  GPLv3, Copyright Paul Marcelin

Parameters:

  PlaceholderSuggestedStackName:
    Type: String
    Default: "TestScpProtectS3StorageClassTag"

  PlaceholderHelp:
    Type: String
    Default: "github.com/sqlxpert/aws-rcp-s3-require-intelligent-tiering#testing"

  ScpOn:
    Type: String
    Description: >-
      Whether the optional service control policy to protect S3 storage class
      tags is in effect. Before creating a CloudFormation stack from this
      template, temporarily detach the SCP from the AWS account in which you
      will create the stack. (Make this change in you AWS Organizations
      management account.) Test with the SCP off and this parameter set to
      false , then re-attach the SCP, change this parameter to true , and
      re-test.
    AllowedValues:
      - "false"
      - "true"

  PlaceholderAdvancedParameters:
    Type: String
    Default: ""
    AllowedValues:
      - ""

  TestS3BucketConstantNamePrefix:
    Type: String
    Description: >-
      Name prefix for all test S3 buckets. This must be 2 to 7 characters
      long.
    Default: "testscp"
    MinLength: 2
    MaxLength: 7

  S3BucketTagKeyStrict:
    Type: String
    Description: >-
      S3 bucket tag key to require that all objects be created in the
      designated storage class. This must match the resource control policy
      CloudFormation stack parameter or Terraform module input value.
    Default: "cost-s3-require-storage-class-intelligent-tiering"

  S3BucketTagKeyPermissive:
    Type: String
    Description: >-
      S3 bucket tag key to require that objects without the overriding S3
      object tag be created in the designated storage class.  This must match
      the resource control policy CloudFormation stack parameter or Terraform
      module input value.
    Default: "cost-s3-require-storage-class-intelligent-tiering-override-with-object-tag"

Metadata:

  AWS::CloudFormation::Interface:
    ParameterGroups:
      - Label:
          default: For Reference
        Parameters:
          - PlaceholderSuggestedStackName
          - PlaceholderHelp
      - Label:
          default: Essential
        Parameters:
          - ScpOn
      - Label:
          default: Advanced...
        Parameters:
          - PlaceholderAdvancedParameters
          - TestS3BucketConstantNamePrefix
          - S3BucketTagKeyStrict
          - S3BucketTagKeyPermissive
    ParameterLabels:
      PlaceholderSuggestedStackName:
        default: Suggested stack name
      PlaceholderHelp:
        default: For help with this stack, see
      PlaceholderAdvancedParameters:
        default: Do not change the parameters below unless necessary!
      ScpOn:
        default: Whether the service control policy applies
      TestS3BucketConstantNamePrefix:
        default: Test bucket name prefix
      S3BucketTagKeyStrict:
        default: Bucket tag to require the storage class for all new objects
      S3BucketTagKeyPermissive:
        default: Bucket tag to require the storage class but permit overrides

Conditions:

  ScpOnTrue: !Equals [ !Ref ScpOn, "true" ]

Resources:

  S3Bucket01:
    Type: AWS::S3::Bucket
    Properties:
      BucketNamespace: account-regional
      BucketNamePrefix: !Sub "${TestS3BucketConstantNamePrefix}01"

  S3Bucket02Abac:
    Type: AWS::S3::Bucket
    Properties:
      BucketNamespace: account-regional
      BucketNamePrefix: !Sub "${TestS3BucketConstantNamePrefix}02-abac"
      AbacStatus: Enabled

  S3Bucket03AbacStrict:
    Type: AWS::S3::Bucket
    Properties:
      BucketNamespace: account-regional
      BucketNamePrefix: !Sub "${TestS3BucketConstantNamePrefix}03-abac-strict"
      AbacStatus: Enabled
      Tags:
        - { Key: !Ref S3BucketTagKeyStrict, Value: "" }

  S3Bucket04AbacPermissive:
    Type: AWS::S3::Bucket
    Properties:
      BucketNamespace: account-regional
      BucketNamePrefix: !Sub "${TestS3BucketConstantNamePrefix}04-abac-permissive"
      AbacStatus: Enabled
      Tags:
        - { Key: !Ref S3BucketTagKeyPermissive, Value: "" }

  TestDirectorLambdaFnRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal: { Service: !Sub "lambda.${AWS::URLSuffix}" }
            Action: sts:AssumeRole
      Policies:
        - PolicyName: CloudWatchLogsCreateLogGroupIfDeleted
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                Resource: !GetAtt LambdaFnLogGrp.Arn
        - PolicyName: CloudWatchLogsWrite
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: !Sub "arn:${AWS::Partition}:logs:${AWS::Region}:${AWS::AccountId}:log-group:${LambdaFnLogGrp}:log-stream:*"
                # !GetAtt LogGroup.Arn ends with :* instead of allowing us to
                # append :log-stream:* to make a log stream ARN
        - PolicyName: LambdaInvoke
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - lambda:InvokeFunction
                Resource: !GetAtt TesterLambdaFn.Arn

  TesterLambdaFnRole:
    Type: AWS::IAM::Role
    Properties:
      # Temporary, single stack; easy reference (in ScpPrincipalCondition)
      # without an output:
      RoleName: TestScpProtectS3StorageClassTag-TesterLambdaFnRole
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal: { Service: !Sub "lambda.${AWS::URLSuffix}" }
            Action: sts:AssumeRole
      Policies:
        - PolicyName: CloudWatchLogsCreateLogGroupIfDeleted
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                Resource: !GetAtt LambdaFnLogGrp.Arn
        - PolicyName: CloudWatchLogsWrite
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: !Sub "arn:${AWS::Partition}:logs:${AWS::Region}:${AWS::AccountId}:log-group:${LambdaFnLogGrp}:log-stream:*"
                # !GetAtt LogGroup.Arn ends with :* instead of allowing us to
                # append :log-stream:* to make a log stream ARN
        - PolicyName: S3Write
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - s3:TagResource
                  - s3:UntagResource
                  - s3:PutBucketAbac
                  # OK to remove when cloudformation:UpdateResource is removed:
                  - s3:GetBucketAbac
                Resource:
                  - !Sub "arn:${AWS::Partition}:s3:::${S3Bucket01}"
                  - !Sub "arn:${AWS::Partition}:s3:::${S3Bucket02Abac}"
                  - !Sub "arn:${AWS::Partition}:s3:::${S3Bucket03AbacStrict}"
                  - !Sub "arn:${AWS::Partition}:s3:::${S3Bucket04AbacPermissive}"
              - Sid: TempOverpermissionUntilLambdaBotoGetsS3PutBucketAbac
                # See s3_put_bucket_abac in Python source code, below.
                Effect: Allow
                Action:
                  - cloudformation:UpdateResource
                  - cloudformation:GetResourceRequestStatus
                Resource: "*"

  LambdaFnLogGrp:
    Type: AWS::Logs::LogGroup
    Properties:
      # Temporary, single stack; easy reference without an output
      LogGroupName: TestScpProtectS3StorageClassTag
      RetentionInDays: 3

  TestDirectorLambdaFn:
    Type: AWS::Lambda::Function
    Properties:
      # Temporary, single stack; easy reference without an output
      FunctionName: TestScpProtectS3StorageClassTagTestDirector
      Role: !GetAtt TestDirectorLambdaFnRole.Arn
      Timeout: 120  # seconds
      MemorySize: 128  # MB
      LoggingConfig:
        LogGroup: !Ref LambdaFnLogGrp
        LogFormat: JSON
        SystemLogLevel: WARN
        ApplicationLogLevel: WARN
      Architectures:
        - arm64
      Runtime: python3.14
      Environment:
        Variables:
          "TESTER_LAMBDA_FUNCTION_ARN": !GetAtt TesterLambdaFn.Arn
          "S3_BUCKET_NAMES_JSON_ARRAY": !Sub
            - |-
              ["${S3BucketNamesJsonArrayBody}"]
            - S3BucketNamesJsonArrayBody: !Join
                - |-
                  ","
                -
                  - !Ref S3Bucket01
                  - !Ref S3Bucket02Abac
                  - !Ref S3Bucket03AbacStrict
                  - !Ref S3Bucket04AbacPermissive
      Handler: index.lambda_handler
      Code:  # test_director_rcp_scp.py
        ZipFile: |
          #!/usr/bin/env python3
          """Test director for

          github.com/sqlxpert/aws-rcp-s3-require-intelligent-tiering
          GPLv3, Copyright Paul Marcelin

          All inputs are from environment variables. Input event is ignored.
          """

          import os
          import logging
          import json
          import boto3


          logger = logging.getLogger()
          # Skip "credentials in environment" INFO message, unavoidable in AWS Lambda:
          logging.getLogger("botocore").setLevel(logging.WARNING)


          TESTER_LAMBDA_INVOKE_KWARGS_BASE = {
              "FunctionName": os.environ["TESTER_LAMBDA_FUNCTION_ARN"],
              "InvocationType": "Event",  # asynchronous
          }
          S3_BUCKET_NAMES = json.loads(os.environ["S3_BUCKET_NAMES_JSON_ARRAY"])


          aws_clients = {}


          def get_aws_client(aws_service):
              """Return an AWS service client, creating it if necessary

              Alternatives considered:
              https://github.com/boto/boto3/issues/3197#issue-1175578228
              https://github.com/aws-samples/boto-session-manager-project
              """
              if not aws_clients.get(aws_service):
                  aws_clients[aws_service] = boto3.client(aws_service)
              return aws_clients[aws_service]


          def lambda_handler(event, context):  # pylint: disable=unused-argument
              """Get S3 buckets from environment as JSON, call test Lambda for each
              """
              for s3_bucket_name in S3_BUCKET_NAMES:
                  get_aws_client("lambda").invoke(
                      **TESTER_LAMBDA_INVOKE_KWARGS_BASE,
                      Payload=json.dumps({
                          "s3_bucket_name": s3_bucket_name,
                  })
              )
        # ZIPFILE_END

  TesterLambdaFn:
    Type: AWS::Lambda::Function
    Properties:
      # Temporary, single stack; easy reference without an output
      FunctionName: TestScpProtectS3StorageClassTagTester
      Role: !GetAtt TesterLambdaFnRole.Arn
      Timeout: 300  # seconds; note boto3 waiter
      MemorySize: 128  # MB
      LoggingConfig:
        LogGroup: !Ref LambdaFnLogGrp
        LogFormat: JSON
        SystemLogLevel: WARN
        ApplicationLogLevel: INFO
      TracingConfig: { Mode: PassThrough }
      Architectures:
        - arm64
      Runtime: python3.13
      Environment:
        Variables:
          "AWS_PARTITION": !Ref AWS::Partition
          "AWS_ACCOUNT_ID": !Ref AWS::AccountId
          "S3_BUCKET_CONSTANT_NAME_PREFIX": !Ref TestS3BucketConstantNamePrefix
          "S3_BUCKET_CONSTANT_NAME_SUFFIX": !Sub "-${AWS::AccountId}-${AWS::Region}-an"
          "S3_BUCKET_TAG_KEY_STRICT": !Ref S3BucketTagKeyStrict
          "S3_BUCKET_TAG_KEY_PERMISSIVE": !Ref S3BucketTagKeyPermissive
          "SCP_ON": !If [ ScpOnTrue, "1", "0" ]
          # Awful for so many reasons, not least that CloudFormation has no
          # Boolean type, that all Linux environment variable values are always
          # just strings, that the capitalization of the true and false
          # literals differs in YAML and Python, and that Python doesn't offer
          # an idiomatic way to convert true and false literals to Boolean
          # values.
      Handler: index.lambda_handler
      Code:  # tester_scp.py
        ZipFile: |
          #!/usr/bin/env python3
          """Service control policy tester for

          github.com/sqlxpert/aws-rcp-s3-require-intelligent-tiering
          GPLv3, Copyright Paul Marcelin

          See TestDirectorLambdaFn for input event format.
          """

          import os
          import logging
          import json
          import botocore
          import boto3


          logger = logging.getLogger()
          # Skip "credentials in environment" INFO message, unavoidable in AWS Lambda:
          logging.getLogger("botocore").setLevel(logging.WARNING)


          ENV = {
              variable_name: os.environ[variable_name]
              for variable_name in [
                  "AWS_PARTITION",
                  "AWS_ACCOUNT_ID",
                  "S3_BUCKET_CONSTANT_NAME_PREFIX",
                  "S3_BUCKET_CONSTANT_NAME_SUFFIX",
                  "S3_BUCKET_TAG_KEY_STRICT",
                  "S3_BUCKET_TAG_KEY_PERMISSIVE",
              ]
          }
          SCP_ON = bool(int(os.environ["SCP_ON"]))
          SCP_OFF = not SCP_ON
          NON_PROTECTED_TAG_KEY = "non-protected-tag-key"


          def log(entry_type, entry_value, log_level=logging.INFO):
              """Take type and value, and emit a JSON-format log entry
              """
              entry_value_out = json.loads(json.dumps(entry_value, default=str))
              # Avoids "Object of type datetime is not JSON serializable" in
              # https://github.com/aws/aws-lambda-python-runtime-interface-client/blob/9efb462/awslambdaric/lambda_runtime_log_utils.py#L109-L135
              #
              # The JSON encoder in the AWS Lambda Python runtime isn't configured to
              # serialize datatime values in responses returned by AWS's own Python SDK!
              #
              # Alternative considered:
              # https://docs.powertools.aws.dev/lambda/python/latest/core/logger

              logger.log(
                  log_level, "", extra={"type": entry_type, "value": entry_value_out}
              )


          aws_clients = {}


          def get_aws_client(aws_service):
              """Return an AWS service client, creating it if necessary

              Alternatives considered:
              https://github.com/boto/boto3/issues/3197#issue-1175578228
              https://github.com/aws-samples/boto-session-manager-project
              """
              if not aws_clients.get(aws_service):
                  aws_clients[aws_service] = boto3.client(aws_service)
              return aws_clients[aws_service]


          def s3_put_bucket_abac(s3_bucket_name, enable_abac):
              """Enable or disable ABAC for an S3 bucket, return response or exception

              As of 2026-04, the Lambda Python 3.14 runtime bundles boto3 v1.40.4
              (2025-08-06), which predates the introduction of attribute-based access
              control for S3 buckets (2025-11-20). Rather than require users to build a
              Lambda bundle, and give up AWS's secure, automatic patching, I use
              CloudControl temporarily.

              https://github.com/boto/botocore/releases/tag/1.40.4
              https://aws.amazon.com/about-aws/whats-new/2025/11/amazon-s3-attribute-based-access-control
              https://docs.aws.amazon.com/lambda/latest/dg/runtimes-update.html#runtime-management-controls
              https://docs.aws.amazon.com/cloudcontrolapi/latest/userguide/resource-operations-update.html
              """
              request_token = ""
              try:
                  # For future use (and reduce TesterLambdaFnRole permissions):
                  # response = get_aws_client("s3").put_bucket_abac(
                  #     Bucket=s3_bucket_name,
                  #     AbacStatus={
                  #         "Status": "Enabled" if enable_abac else "Disabled"
                  #     }
                  # )

                  response = get_aws_client("cloudcontrol").update_resource(
                      TypeName="AWS::S3::Bucket",
                      Identifier=s3_bucket_name,
                      PatchDocument=json.dumps([{
                          "op": "replace",
                          "path": "AbacStatus",
                          "value": "Enabled" if enable_abac else "Disabled"
                      }])
                  )
                  request_token = (
                      response.get("ProgressEvent", {}).get("RequestToken", "")
                  )
                  waiter = get_aws_client("cloudcontrol").get_waiter(
                      "resource_request_success"
                  )
                  waiter.wait(
                      RequestToken=request_token,
                      WaiterConfig={
                          "Delay": 5,  # Seconds
                          "MaxAttempts": 18  # 5 * 18 = 45 seconds; note Lambda Timeout
                      }
                  )
              except botocore.exceptions.WaiterError as waiter_exception:
                  if (
                      "Waiter encountered a terminal failure state"
                      not in str(waiter_exception)
                  ):
                      raise
              # No other normal errors expected

              return get_aws_client("cloudcontrol").get_resource_request_status(
                  RequestToken=request_token
              )  # No normal error expected


          def s3_tag_untag_resource(kwargs_base, tag_key, tag_value=None):
              """Tag or untag (no input value) S3 resource, return response or exception
              """
              try:
                  if tag_value is None:
                      response = get_aws_client("s3control").untag_resource(
                          **kwargs_base,
                          TagKeys=[
                              tag_key,
                          ]
                      )
                  else:
                      response = get_aws_client("s3control").tag_resource(
                          **kwargs_base,
                          Tags=[
                              {
                                  "Key": tag_key,
                                  "Value": tag_value
                              },
                          ]
                      )
              except Exception as misc_exception:  # pylint: disable=broad-exception-caught
                  response = misc_exception
              return response


          def s3_tag_untag_bucket(
              s3_bucket_name, tag_key, tag_value=None, untag_after_tag=True
          ):
              """Tag and/or untag an S3 bucket, return response or exception
              """
              kwargs_base = {
                  "AccountId": ENV["AWS_ACCOUNT_ID"],
                  "ResourceArn": f"arn:{ENV["AWS_PARTITION"]}:s3:::{s3_bucket_name}",
              }
              if tag_value is not None:
                  response = s3_tag_untag_resource(kwargs_base, tag_key, tag_value)
              if (
                  (tag_value is None)
                  or (untag_after_tag and not isinstance(response, Exception))
              ):
                  # Successful tagging response, if any, is discarded
                  response = s3_tag_untag_resource(kwargs_base, tag_key)
              return response


          def assess_boto3_response_for_deny(response):
              """Take a boto3 response or exception, return flags: Deny, Deny from SCP
              """
              error_message = ""
              if isinstance(response, Exception):
                  deny = True
                  if isinstance(response, botocore.exceptions.ClientError):
                      error_message = getattr(
                          response, "response", {}
                      ).get("Error", {}).get("Message", "")
              elif "ProgressEvent" in response:
                  cloudcontrol_progress = response["ProgressEvent"]
                  # pylint: disable=superfluous-parens
                  deny = (cloudcontrol_progress.get("OperationStatus", "") == "FAILED")
                  # pylint: enable=superfluous-parens
                  if deny:
                      error_message = cloudcontrol_progress.get("StatusMessage", "")
              else:
                  deny = False
              return (
                  deny,
                  ("explicit deny in a service control policy" in error_message)
                  or not deny
              )


          def label_result(result_dict):
              """Take test result dict, replace "number" with "test_number": "TEST-N+.N"

              Missing "number" key is an unexpected error.
              """
              result_dict["test_number"] = f"TEST-{result_dict["number"]:.1f}"
              del result_dict["number"]
              return result_dict


          def assess_boto3_response(
              method_tested, expected_allow, response, result_dict
          ):
              """Take test info., expectation, result; assess, update result, and log
              """
              (deny, scp_was_cause_if_deny) = assess_boto3_response_for_deny(response)
              allow = not deny
              result_dict.update({
                  "scp": SCP_ON,
                  "allow": allow,
                  "pass": (expected_allow == allow) and scp_was_cause_if_deny,
              })
              if not result_dict["pass"]:
                  result_dict.update({
                      "error":
                          "Allow was expected"
                          if expected_allow else
                          "Deny was expected"
                          if scp_was_cause_if_deny else
                          "Deny from SCP was expected",
                  })
                  if not scp_was_cause_if_deny:
                      result_dict.update({
                          "check_cause": response,
                  })
              log(f"{method_tested}_TEST_RESULT", label_result(result_dict))


          def extract_s3_bucket_traits(event):
              """Take bucket name, return dict of bucket's traits
              """
              s3_bucket_name = event["s3_bucket_name"]
              s3_bucket_traits = s3_bucket_name.removesuffix(
                  ENV["S3_BUCKET_CONSTANT_NAME_SUFFIX"]
              ).removeprefix(
                  ENV["S3_BUCKET_CONSTANT_NAME_PREFIX"]
              ).split("-")
              s3_bucket = {
                  "number": int(s3_bucket_traits[0]),
                  "s3_bucket_name": s3_bucket_name,

                  "abac": "abac" in s3_bucket_traits,
              }
              return s3_bucket


          def assess_s3_put_bucket_abac_response(
              s3_bucket, test_number_fraction, enable_abac, expected_allow=True
          ):
              """Take S3 bucket dict; test PutBucketAbac, log result
              """
              response = s3_put_bucket_abac(s3_bucket["s3_bucket_name"], enable_abac)
              result_dict = s3_bucket | {  # Copy dict, then update
                  "number": s3_bucket["number"] + test_number_fraction,
                  "enable_abac": enable_abac,
              }
              assess_boto3_response(
                  "S3_PUT_BUCKET_ABAC", expected_allow, response, result_dict
              )


          def assess_s3_tag_bucket_response(
              s3_bucket,
              test_number_fraction,
              tag_value,
              tag_key=ENV["S3_BUCKET_TAG_KEY_STRICT"],
              untag_after_tag=True,
              expected_allow=True
          ):  # pylint: disable=too-many-arguments,too-many-positional-arguments
              """Take S3 bucket dict, tag value; test TagResource, log result
              """
              response = s3_tag_untag_bucket(
                  s3_bucket["s3_bucket_name"],
                  tag_key,
                  tag_value=tag_value,
                  untag_after_tag=untag_after_tag
              )
              result_dict = s3_bucket | {  # Copy dict, then update
                  "number": s3_bucket["number"] + test_number_fraction,
                  "tag_key": tag_key,
                  "tag_value": tag_value,
                  "untag_after_tag": untag_after_tag,
              }
              assess_boto3_response(
                  "S3_TAG_UNTAG_RESOURCE", expected_allow, response, result_dict
              )


          def lambda_handler(event, context):  # pylint: disable=unused-argument
              """Take event (S3 bucket name); test, and log results
              """
              s3_bucket = extract_s3_bucket_traits(event)

              assess_s3_tag_bucket_response(
                  s3_bucket,
                  0.0,
                  "tag-value-0-initial",
                  tag_key=NON_PROTECTED_TAG_KEY,
                  untag_after_tag=False
              )
              assess_s3_tag_bucket_response(
                  s3_bucket,
                  0.1,
                  "tag-value-1-changed",
                  tag_key=NON_PROTECTED_TAG_KEY
              )
              assess_s3_tag_bucket_response(
                  s3_bucket,
                  0.2,
                  "",
                  tag_key=ENV["S3_BUCKET_TAG_KEY_STRICT"],
                  expected_allow=SCP_OFF
                  # Tags then untags by default, so restore in TEST-3.5 (SCP_OFF)
              )
              assess_s3_tag_bucket_response(
                  s3_bucket,
                  0.3,
                  "",
                  tag_key=ENV["S3_BUCKET_TAG_KEY_PERMISSIVE"],
                  expected_allow=SCP_OFF
                  # Tags then untags by default, so restore in TEST-4.5 (SCP_OFF)
              )

              # Some test numbers are skipped intentionally.
              # SCP bucket/test numbers are consistent with RCP test equivalents.
              # Simple by comparison, the SCP tests all have consistent decimals:
              # N.0 to N.5  Bucket tagging
              # N.6 to N.8  ABAC

              match s3_bucket["number"]:

                  case 1:
                      assess_s3_put_bucket_abac_response(
                          s3_bucket, 0.6, True, expected_allow=SCP_OFF
                      )
                      assess_s3_put_bucket_abac_response(
                          s3_bucket, 0.7, False, expected_allow=True
                      )

                      # TEST-1.7 passes in spite of the SCP! CloudControl
                      # treats disabling ABAC as a success (idempotence?) if ABAC
                      # was already disabled. After AWS updates boto3 in the
                      # Python Lambda runtime and CloudControl can be replaced with
                      # s3.put_bucket_abc , change expected_allow to SCP_OFF .

                  case 2:
                      assess_s3_put_bucket_abac_response(
                          s3_bucket, 0.7, False, expected_allow=SCP_OFF
                      )
                      assess_s3_put_bucket_abac_response(
                          s3_bucket, 0.8, True, expected_allow=True
                      )

                      # TEST-2.8 passes in spite of the SCP! See above.

                  case 3:
                      assess_s3_tag_bucket_response(
                          s3_bucket,
                          0.4,
                          None,
                          tag_key=ENV["S3_BUCKET_TAG_KEY_STRICT"],
                          expected_allow=SCP_OFF
                      )
                      assess_s3_tag_bucket_response(
                          s3_bucket,
                          0.5,
                          "",
                          tag_key=ENV["S3_BUCKET_TAG_KEY_STRICT"],
                          untag_after_tag=False,  # Restore tag from TEST-3.2 (SCP_OFF)
                          expected_allow=SCP_OFF
                      )
                  case 4:
                      assess_s3_tag_bucket_response(
                          s3_bucket,
                          0.4,
                          None,
                          tag_key=ENV["S3_BUCKET_TAG_KEY_PERMISSIVE"],
